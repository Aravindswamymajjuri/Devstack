# SonarQube Configuration for 2025YearlyProject-Team4
# This file configures SonarQube for analyzing code quality, duplicates, and code smells

# ====================
# Project Information
# ====================
sonar.projectKey=team4-2025-yearly-project
sonar.projectName=2025 Yearly Project - Team 4
sonar.projectVersion=1.0

# ====================
# Source Code Paths
# ====================
# Backend sources
sonar.sources=backend,frontend/src

# Backend source directories
sonar.sources.backend=backend

# Frontend source directories  
sonar.sources.frontend=frontend/src

# ====================
# Exclusions
# ====================
# Exclude node_modules, build artifacts, cache, and test files
sonar.exclusions=**/node_modules/**,\
                 **/dist/**,\
                 **/build/**,\
                 **/coverage/**,\
                 **/.cache/**,\
                 **/.next/**,\
                 **/uploads/**,\
                 **/*.min.js,\
                 **/test/**,\
                 **/tests/**,\
                 **/*.test.js,\
                 **/*.spec.js,\
                 package-lock.json,\
                 yarn.lock,\
                 README.md,\
                 .gitignore

# ====================
# Test Coverage
# ====================
# Coverage report paths (if using Jest or other coverage tools)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ====================
# Code Analysis Settings
# ====================
# JavaScript/TypeScript settings
sonar.language=js

# Analyze both JavaScript and TypeScript
sonar.sources=backend,frontend/src

# ====================
# Duplicate Detection
# ====================
# Enable cross-project duplication detection
sonar.cpd.cross_project=true

# Minimum tokens in a block to be considered duplicate
sonar.cpd.minimumTokens=100

# ====================
# Code Smells & Complexity
# ====================
# Cognitive complexity threshold for functions
sonar.javascript.cognitive.complexity.threshold=15

# ====================
# Logging
# ====================
# sonar.verbose=true

# ====================
# Additional Configuration
# ====================
# Encoding
sonar.sourceEncoding=UTF-8

# Host URL (change if using a different SonarQube instance)
sonar.host.url=http://localhost:9000
sonar.token=squ_b3fad5e3eeaed99ed85b4fbc946cea205abd8c78
